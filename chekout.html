<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - A STEAK</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="chekout.css" />

    <style>
      /* Stroke merah untuk form pengisian */
      .input-group input:focus {
        outline: 2px solid #b30000;
        border-color: transparent;
      }

      /* Stroke merah untuk kotak payment yang sedang dipilih */
      .payment-option:has(input[type="radio"]:checked) {
        outline: 2px solid #b30000;
      }

      /* Mengubah garis bulat radio menjadi merah */
      .payment-option input[type="radio"]:checked + .custom-radio {
        border-color: #b30000 !important;
      }

      /* Mengubah titik bulat di tengah menjadi merah */
      .payment-option input[type="radio"]:checked + .custom-radio::after {
        background: #b30000 !important;
      }
    </style>
  </head>
  <body>
    <header style="position: relative">
      <a href="#" class="logo-link">
        <img src="img/logo.png" alt="Logo A Steak" class="logo-img" />
      </a>

      <nav style="position: absolute; left: 50%; transform: translateX(-50%)">
        <ul>
          <li><a href="./index home.html">Home</a></li>
          <li><a href="./menu.html">Menu</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <div class="search-box">
          <i class="fas fa-search" style="color: #888"></i>
          <input type="text" placeholder="Search..." />
        </div>
        <a href="./cart.html"
          ><i class="fas fa-shopping-cart cart-icon" style="color: #b30000"></i
        ></a>
      </div>
    </header>

    <main class="checkout-container">
      <div class="checkout-left">
        <h2>SHIPING ADDRESS</h2>

        <form class="shipping-form">
          <div class="input-group">
            <label>NAME</label>
            <input type="text" placeholder="Enter first & last name" />
          </div>

          <div class="input-group">
            <label>ADDRESS</label>
            <input type="text" placeholder="Enter your address" />
          </div>

          <div class="input-group">
            <label>PHONE NUMBER</label>
            <input type="text" placeholder="Enter phone number" />
          </div>

          <div class="input-group">
            <label>EMAIL</label>
            <input type="email" placeholder="Enter email address" />
          </div>
        </form>

        <h2 class="payment-title">PAYMENT METHOD</h2>

        <div class="payment-methods">
          <label class="payment-option">
            <span class="payment-logo">
              <img
                src="img/qrispng.png"
                alt="QRIS Logo"
                style="height: 25px; width: auto"
              />
            </span>
            <input type="radio" name="payment" value="qris" checked />
            <span class="custom-radio"></span>
          </label>

          <label class="payment-option">
            <span class="payment-logo">
              <img
                src="img/dana.png"
                alt="DANA Logo"
                style="height: 25px; width: auto"
              />
            </span>
            <input type="radio" name="payment" value="dana" />
            <span class="custom-radio"></span>
          </label>

          <label class="payment-option">
            <span class="payment-logo">
              <img
                src="img/gopay.png"
                alt="GoPay Logo"
                style="height: 25px; width: auto"
              />
            </span>
            <input type="radio" name="payment" value="gopay" />
            <span class="custom-radio"></span>
          </label>
        </div>
      </div>

      <div class="checkout-right">
        <div class="order-summary-box">
          <div class="summary-items-list">
            <div class="summary-item">
              <img
                src="img/teriyaki menu.png"
                alt="Nasi Ayam Teriyaki"
                class="item-img"
              />
              <div class="item-details">
                <h4>NASI AYAM TERIYAKI</h4>
                <p>Quantity : 2</p>
                <p class="item-price">Rp 30.000</p>
              </div>
            </div>

            <div class="summary-item">
              <img
                src="img/dimsum teriyaki.png"
                alt="Nasi Ayam Teriyaki Dimsum"
                class="item-img"
              />
              <div class="item-details">
                <h4>NASI AYAM TERIYAKI DIMSUM</h4>
                <p>Quantity : 4</p>
                <p class="item-price">Rp 140.000</p>
              </div>
            </div>

            <div class="summary-item">
              <img
                src="img/bbq 35.png"
                alt="Steak Daging Ayam Saus BBQ"
                class="item-img"
              />
              <div class="item-details">
                <h4>STEAK DAGING AYAM SAUS BBQ</h4>
                <p>Quantity : 1</p>
                <p class="item-price">Rp 35.000</p>
              </div>
            </div>
          </div>

          <hr class="summary-divider" />

          <div class="summary-totals">
            <div class="summary-line">
              <span class="lbl"
                >SUBTOTAL <span class="small-text">(3 ITEMS)</span></span
              >
              <span class="val">Rp 48.000</span>
            </div>
            <div class="summary-line">
              <span class="lbl">SHIPPING</span>
              <span class="val">Rp 18.000</span>
            </div>
          </div>

          <hr class="summary-divider" />

          <div class="summary-line total-line">
            <span class="lbl">TOTAL</span>
            <span class="val">Rp 18.000</span>
          </div>
        </div>

        <a href="./sukses.html"
          ><button class="btn-checkout-red">CHEK OUT</button></a
        >
      </div>
    </main>
  </body>
</html>
