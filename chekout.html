<div class="summary-items-list">
  <div class="summary-item" data-price="15000">
    <img src="img/teriyaki.png" alt="Nasi Ayam Teriyaki" class="item-img" />
    <div class="item-details" style="width: 100%">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
        "
      >
        <h4>NASI AYAM TERIYAKI</h4>
        <button
          class="btn-remove"
          style="
            background: none;
            border: none;
            color: #a80000;
            cursor: pointer;
            font-size: 16px;
          "
        >
          <i class="fas fa-times"></i>
        </button>
      </div>

          justify-content: space-between;
          align-items: center;
          margin-top: 10px;
        "
      >

          style="
            display: flex;
            align-items: center;
            background: #eee;
            border-radius: 15px;
            padding: 2px 10px;
          "
        >
          <button
            class="btn-minus"
            style="
              border: none;
              background: transparent;
              cursor: pointer;
              font-weight: bold;
              font-size: 16px;
            "
          >
            -
          </button>
          <span class="qty-val" style="margin: 0 10px; font-weight: bold"
            >2</span
          >
          <button
            class="btn-plus"

              border: none;
              background: transparent;
              cursor: pointer;

            "
          >

          </button>
        </div>
        <p class="item-price">Rp 30.000</p>

    </div>
