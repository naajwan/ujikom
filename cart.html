<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart - A STEAK</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <header>
      <a href="#" class="logo-link">
        <img src="img/logo.png" alt="Logo A Steak" class="logo-img" />
      </a>
      <nav>
        <ul>
          <li><a href="./index home.html">Home</a></li>
          <li><a href="./menu.html">Menu</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Search..." />
        </div>
        <i class="fas fa-shopping-cart cart-icon"></i>
      </div>
    </header>

    <main class="cart-container">
      <div class="cart-title-area">
        <h1>MY CART <span class="cart-count">(0 PRODUCTS)</span></h1>
      </div>

      <div class="cart-content">
        <div class="cart-items-col">
          <div class="cart-header grid-row">
            <div class="col-product">PRODUK</div>
            <div class="col-price">HARGA</div>
            <div class="col-qty">JUMLAH</div>
            <div class="col-total">TOTAL</div>
          </div>

          <div class="cart-items-list" id="cart-container-list"></div>

          <div class="cart-actions-bottom">
            <div class="coupon-group">
              <input
                type="text"
                placeholder="Tambahkan Kode Kupon"
                class="coupon-input"
                id="couponInput"
              />
              <button class="btn-red-small" id="btnApplyCoupon">
                TERAPKAN KUPON
              </button>
            </div>
            <a href="#" class="clear-cart-link" id="btnClearCart"
              >Hapus Keranjang Belanja</a
            >
          </div>
        </div>

        <div class="order-summary-col">
          <div class="summary-box">
            <h3>ORDER SUMARY</h3>
            <div class="summary-line">
              <span class="lbl">ITEMS</span>
              <span class="val total-items-val">0</span>
            </div>
            <div class="summary-line">
              <span class="lbl">SHIPPING</span>
              <span class="val shipping-val">Rp 0</span>
            </div>
            <div class="summary-line">
              <span class="lbl">SUBTOTAL</span>
              <span class="val subtotal-val">Rp 0</span>
            </div>
            <div class="summary-line">
              <span class="lbl">COUPON PROMO</span>
              <span class="val coupon-val">Rp 0</span>
            </div>
            <hr class="summary-divider" />
            <div class="summary-line total-line">
              <span class="lbl">TOTAL</span>
              <span class="val grand-total-val">Rp 0</span>
            </div>
            <a href="./chekout.html">
              <button class="btn-checkout">GO TO CHECKOUT</button>
            </a>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Ambil data dari ingatan browser (localStorage)
        let cart = JSON.parse(localStorage.getItem("asteak_cart")) || [];
        let couponDiscount = 0;
        const shippingCost = 18000; // Ongkir 18rb jika ada barang

        const cartList = document.getElementById("cart-container-list");

        // Fungsi untuk menggambar ulang HTML keranjang
        function renderCart() {
          cartList.innerHTML = "";
          let subtotal = 0;
          let totalItems = 0;

          if (cart.length === 0) {
            cartList.innerHTML = `<div class="empty-cart-msg">Keranjang belanjamu masih kosong. Yuk pesan A STEAK!</div>`;
            couponDiscount = 0;
          } else {
            cart.forEach((item, index) => {
              const rowTotal = item.price * item.qty;
              subtotal += rowTotal;
              totalItems += item.qty;

              cartList.innerHTML += `
                <div class="cart-item grid-row">
                  <div class="col-product">
                    <button class="remove-btn" data-index="${index}"><i class="fas fa-times"></i></button>
                    <img src="${item.image}" alt="${item.name}" class="item-img" />
                    <div class="item-info">
                      <h4>${item.name}</h4>
                      <p>${item.desc}</p>
                    </div>
                  </div>
                  <div class="col-price">Rp ${item.price.toLocaleString("id-ID")}</div>
                  <div class="col-qty">
                    <span class="qty-text">${item.qty}</span>
                  </div>
                  <div class="col-total">Rp ${rowTotal.toLocaleString("id-ID")}</div>
                </div>
              `;
            });
          }

          // Perhitungan Ringkasan
          let currentShipping = totalItems > 0 ? shippingCost : 0;
          let grandTotal = subtotal + currentShipping - couponDiscount;
          if (grandTotal < 0) grandTotal = 0;

          // Update Angka di Layar
          document.querySelector(".cart-count").innerText =
            `(${totalItems} PRODUCTS)`;
          document.querySelector(".total-items-val").innerText = totalItems;
          document.querySelector(".shipping-val").innerText =
            "Rp " + currentShipping.toLocaleString("id-ID");
          document.querySelector(".subtotal-val").innerText =
            "Rp " + subtotal.toLocaleString("id-ID");
          document.querySelector(".coupon-val").innerText =
            "Rp " + couponDiscount.toLocaleString("id-ID");
          document.querySelector(".grand-total-val").innerText =
            "Rp " + grandTotal.toLocaleString("id-ID");

          // Simpan perubahan ke memory browser
          localStorage.setItem("asteak_cart", JSON.stringify(cart));
        }

        // --- Event Listener untuk klik tombol hapus ---
        cartList.addEventListener("click", (e) => {
          const index = e.target.closest("button")?.getAttribute("data-index");
          if (index === null || index === undefined) return;

          if (e.target.closest(".remove-btn")) {
            cart.splice(index, 1); // Hapus barang dari array
          }
          renderCart();
        });

        // --- Fitur Kupon ---
        document
          .getElementById("btnApplyCoupon")
          .addEventListener("click", () => {
            if (cart.length === 0) {
              alert("Keranjang kosong, kupon tidak bisa dipakai!");
              return;
            }
            const code = document
              .getElementById("couponInput")
              .value.trim()
              .toUpperCase();
            if (code === "A STEAK") {
              couponDiscount = 10000;
              alert("Kupon Berhasil! Diskon Rp 10.000 diterapkan.");
            } else {
              couponDiscount = 0;
              alert("Kode Kupon tidak valid.");
            }
            renderCart();
          });

        // --- Hapus Semua Keranjang ---
        document
          .getElementById("btnClearCart")
          .addEventListener("click", (e) => {
            e.preventDefault();
            cart = [];
            renderCart();
          });

        // Gambar keranjang saat halaman pertama kali dibuka
        renderCart();
      });
    </script>
  </body>
</html>
